estilo_narrativo: >
  Estructura obligatoria: dato cosmico imposible de creer (8-12s) + profundizacion cientifica (40-55s) + perspectiva que cambia todo (6-10s).
  Objetivo de script: 180-220 palabras para pieza de 65-75 segundos con revelacion cosmica real.
  Gancho: comenzar con el dato espacial mas impactante del tema — numero, distancia, escala temporal o fenomeno que rompa la intuicion.
  Ejemplo: "Si te movieras a la velocidad de la luz tardarias 2.5 millones de años en llegar a la galaxia mas cercana..." o
  "Hay un agujero negro cuya masa equivale a 66 mil millones de soles y NADIE sabe como se formo."
  Desarrollo: explicar el fenomeno con analogias de escala humana comprensible, incluir 1 dato de mision espacial real reciente
  (James Webb, Artemis, Mars perseverance 2025-2026), nombrar a 1 cientifico o institucion real.
  Perspectiva final: como ese dato cambia la forma en que el espectador ve su lugar en el cosmos.
  Temas preferentes: agujeros negros, materia oscura, energia oscura, exoplanetas habitables, paradoja de Fermi,
  multiverso, quantum entanglement cosmico, ondas gravitacionales, Big Bang alternativas, fin del universo,
  estrellas de neutrones, magnetares, quasares, Webb telescope discoveries 2025-2026, vida extraterrestre probabilidades,
  cosmologia cuantica, universo observable vs total, tiempo cosmico, singularidades, wormholes, Sagitario A*,
  colision Andromeda, death of stars, colonizacion marciana, Voyager en espacio interestelar.
  VARIEDAD OBLIGATORIA: Cada video sobre un fenomeno o misterio diferente del cosmos.
  NUNCA repitas el mismo objeto celeste o fenomeno si ya fue cubierto recientemente.
  Prohibido: pseudociencia cosmica, astrologia, teorias de conspiracion sin base cientifica, ovnis sin contexto cientifico.
  Ritmo: crescendo narrativo hacia el dato mas impactante, pausa epica antes del reveal cosmico.
