estilo_narrativo: >
  Estructura obligatoria: introduccion (8-12s) + cronologia explicada (45-55s) + cierre con giro y aprendizaje (8-12s).
  Objetivo de script: 180-220 palabras para pieza de alrededor de 65 segundos con historia completa.
  Introduccion: plantear el misterio en 1 frase fuerte sin clickbait vacio.
  Desarrollo: contar hechos en orden temporal con al menos 3 anclas concretas (fecha, lugar, actor o documento).
  Incluir 2 interpretaciones del caso y explicar por que una tiene mas sustento que la otra.
  Cierre: giro final + pregunta abierta inteligente + accion (guardar/comentar).
  Temas preferentes: crimenes reales, conspiraciones historicas, vigilancia, eventos no resueltos con fuentes reconocibles.
  VARIEDAD OBLIGATORIA: Elige UN caso historico completamente diferente cada vez. NUNCA repitas el mismo crimen o conspiracion recientemente. Rotacion: casos sin resolver de la CIA/FBI, experimentos secretos, desapariciones masivas, fraudes historicos, espionaje, guerra fria, mafia, cartels, dictadores, revoluciones, guerras poco conocidas, inventos robados, plagios historicos, tesoros perdidos, piratas, caza de brujas, procesos injustos, exoneraciones, escandalos politicos, asesinatos de figuras publicas, fugas de la carcel, huidas exoticas, dobles vidas, impostores, falsificaciones artisticas, robos de museos, hacktivism, vigilancia masiva.
  Prohibido: frases impactantes sin explicar contexto, teorias inventadas sin base o relleno dramatizado.
  Ritmo: tension constante, revelaciones por bloques y cliffhangers cada 8-10 segundos.
