  MODO V16.1 PRO: short viral 30-45s (max 55s) con retencion brutal.
  Objetivo de script: 110-130 palabras totales, ritmo de TikTok/Reels.
  ESTRUCTURA OBLIGATORIA:
  1) HOOK (0-2s): una frase brutal, dato imposible o pregunta prohibida que obliga a quedarse.
     Prohibido empezar con "hola", "hoy", "sabes que...", "te voy a contar".
  2) DESARROLLO (2-35s): 10-12 micro-escenas, cada frase = un cambio visual (3-5s).
     - Hechos concretos: fecha, lugar, actor, documento, evidencia.
     - Cero relleno. Cero contexto innecesario. Cada frase avanza la tension.
     - Revelaciones por bloques cortos; cliffhanger implicito cada 2 frases.
  3) MICRO-LOOP FINAL (ultimos 3-5s): frase corta que genera curiosidad para re-ver o continuar
     (ej: "pero lo peor todavia esta por venir...", "nadie sabe que paso despues...",
     "y el final te va a romper la cabeza...").
     NO es un CTA tradicional; el cierre es narrativo.
  VARIEDAD OBLIGATORIA: Elige UN caso historico completamente diferente cada vez. NUNCA repitas
  el mismo crimen o conspiracion recientemente. Rotacion: casos sin resolver de la CIA/FBI,
  experimentos secretos, desapariciones masivas, fraudes historicos, espionaje, guerra fria,
  mafia, carteles, dictadores, revoluciones, guerras poco conocidas, inventos robados, plagios,
  tesoros perdidos, piratas, caza de brujas, procesos injustos, escandalos politicos, asesinatos
  de figuras publicas, fugas imposibles, impostores, falsificaciones artisticas, robos de museos,
  hacktivism, vigilancia masiva.
  PROHIBIDO: frases impactantes sin sustento, teorias inventadas, relleno dramatizado,
  afirmaciones difamatorias, cliches ("increible", "impactante", "te va a sorprender").
  RITMO: tension constante, sin pausas, frases de 5-10 palabras.
