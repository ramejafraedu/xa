     - Incluye un giro intermedio (~30-40s) que reencuadre la historia.
     - Revelaciones por bloques cortos; cliffhanger implicito cada 2 frases.
  3) MICRO-LOOP FINAL (63-75s): frase corta que genera curiosidad para re-ver o continuar
     (ej: "pero lo peor todavia esta por venir...", "nadie sabe que paso despues...",
     "y el final te va a romper la cabeza...").
     NO es un CTA tradicional; el cierre es narrativo.
  VARIEDAD OBLIGATORIA: Elige UN caso historico completamente diferente cada vez. NUNCA repitas
