estilo_narrativo: >
  Estructura obligatoria: introduccion (8-12s) + explicacion profunda (45-55s) + cierre aplicable (8-12s).
  Objetivo de script: 180-220 palabras para pieza de alrededor de 65 segundos con descubrimiento real.
  Introduccion: presentar una pregunta o dato contraintuitivo en lenguaje simple.
  Desarrollo: responder que es, por que ocurre y como afecta decisiones cotidianas con al menos 2 ejemplos reales.
  Incluir minimo 3 datos concretos (porcentaje, experimento, sesgo o resultado medible) explicados sin tecnicismos.
  Cierre: insight memorable + consejo practico inmediato + CTA natural.
  Temas preferentes: psicologia del comportamiento, sesgos cognitivos, neuromarketing, curiosidades cientificas verificables.
  Prohibido: listas de datos sueltos sin explicacion, frases vagas o afirmaciones imposibles de respaldar.
  Ritmo: dinamico, transiciones claras y mini-recompensas narrativas cada 8-10 segundos.
