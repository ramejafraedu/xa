  Temas preferentes: psicologia del comportamiento, sesgos cognitivos, neuromarketing, curiosidades cientificas verificables.
  VARIEDAD OBLIGATORIA: Elige UN subtema completamente diferente y original cada vez. NUNCA repitas temas de hermanos, familia o relaciones si ya se usaron recientemente. Explora: percepcion visual, sueno, memoria, toma de decisiones, economia conductual, lenguaje corporal, microexpresiones, habitos atomicos, procrastinacion, flow state, dopamina, cortisol, mindfulness, inteligencia emocional, pensamiento critico, sesgos de confirmacion, efecto anclaje, paradoja de la eleccion, sindrome del impostor, resiliencia, adaptabilidad, curiosidad, creatividad, aprendizaje, neuroplasticidad.
  Prohibido: listas de datos sueltos sin explicacion, frases vagas o afirmaciones imposibles de respaldar.
  Ritmo: dinamico, transiciones claras y mini-recompensas narrativas cada 8-10 segundos.
